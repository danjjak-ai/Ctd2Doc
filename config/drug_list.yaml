# 타겟 의약품 목록 정의
# Japic Code를 Key로 설정하며, static_list에 정의된 약품들을 기본 타겟으로 하고,
# PMDA 카테고리 크롤링 모드를 활성화할 수 있도록 구성합니다.

crawler:
  mode: "both" # "static" (지정 리스트만), "auto" (자동 탐색), "both" (둘 다)
  auto_categories:
    - "http://www.pmda.go.jp/PmdaSearch/iyakuSearch/" # 예시 PMDA 의약품 검색 메인 카테고리 URL

static_list:
  - japic_code: "520032615"
    name_ja: "エンレスト"
    pmda_url: "https://www.pmda.go.jp/PmdaSearch/iyakuDetail/GeneralList/520032615"
    radar_url: "https://www.rad-ar.or.jp/kusuri/search/detail/520032615"
  - japic_code: "520033577"
    name_ja: "ファビハルタ"
    pmda_url: "https://www.pmda.go.jp/PmdaSearch/iyakuDetail/GeneralList/520033577"
    radar_url: "https://www.rad-ar.or.jp/kusuri/search/detail/520033577"
  - japic_code: "4291043"
    name_ja: "イムブルビカ"
    pmda_url: "https://www.pmda.go.jp/PmdaSearch/iyakuDetail/GeneralList/4291043"
